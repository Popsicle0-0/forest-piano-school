  <!-- Black keys -->
  <rect x="46" y="115" width="14" height="22" fill="#1a1a1a"/>
  <rect x="78" y="115" width="14" height="22" fill="#1a1a1a"/>
  <rect x="116" y="115" width="14" height="22" fill="#1a1a1a"/>
  <rect x="148" y="115" width="14" height="22" fill="#1a1a1a"/>
  <!-- Music note -->
  <circle cx="148" cy="40" r="11" fill="#ffd166"/>
  <rect x="155" y="35" width="3" height="40" fill="#ffd166"/>
  <!-- Text -->
